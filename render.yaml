services:
  - type: web
    name: data-bridge-api
    env: python
    rootDir: backend
    plan: free
    buildCommand: pip install -e ".[dev]"
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/v1/health
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: AUTO_CREATE_TABLES
        value: "false"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "true"
      - key: STORAGE_BACKEND
        value: local
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
