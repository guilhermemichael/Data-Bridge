name: Data-Bridge CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend Quality Gate
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: databridge
          POSTGRES_PASSWORD: databridge
          POSTGRES_DB: databridge_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U databridge -d databridge_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    env:
      APP_ENV: test
      APP_DEBUG: false
      AUTO_CREATE_TABLES: false
      DATABASE_URL: postgresql+psycopg://databridge:databridge@localhost:5432/databridge_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET_KEY: ci-test-secret
      CORS_ORIGINS: http://localhost:5173
      CELERY_TASK_ALWAYS_EAGER: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint backend
        working-directory: backend
        run: python -m ruff check .

      - name: Run database migrations
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Test backend
        working-directory: backend
        run: python -m pytest

  frontend:
    name: Frontend Quality Gate
    runs-on: ubuntu-latest

    env:
      VITE_API_BASE_URL: http://localhost:8000/api/v1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build
